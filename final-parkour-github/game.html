<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parkour — Multiplayer</title>
  <link rel="stylesheet" href="style.css">
  <style>
    #teamScore {
      position: absolute;
      top: 60px;
      left: 10px;
      font-size: 16px;
      font-weight: bold;
      color: #ffd700;
      background: rgba(0, 0, 0, 0.8);
      padding: 10px 14px;
      border-radius: 6px;
      z-index: 100;
      border: 2px solid #ffd700;
    }

    #playerStats {
      position: absolute;
      top: 110px;
      left: 10px;
      font-size: 13px;
      color: #fff;
      background: rgba(0, 0, 0, 0.8);
      padding: 10px 14px;
      border-radius: 6px;
      z-index: 100;
      max-width: 200px;
    }

    .player-stat {
      margin: 5px 0;
      padding: 6px 8px;
      border-radius: 4px;
      font-weight: 500;
    }

    .player-stat.local {
      background: rgba(82, 181, 255, 0.4);
      border-left: 3px solid #82b1ff;
    }

    .player-stat.remote {
      background: rgba(100, 100, 100, 0.3);
      border-left: 3px solid #888;
    }
  </style>
  
  <script async src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="config.js"></script>
  <script src="levels.js"></script>
  <script src="multiplayer.js"></script>
  <script src="shared-coins.js"></script>
</head>
<body>
  <div id="gameWrapper" class="game-wrapper">
    <div id="world" class="world"></div>
    
    <div id="teamScore">Team: 0/48 🪙</div>
    <div id="playerStats"></div>
    
    <div id="score" class="hud-item score">Score: 0</div>
    <div id="remaining" class="hud-item remaining">Münzen: ?</div>
    <div id="lives" class="hud-item lives">Lives: 3</div>
    <div id="level" class="hud-item level">Level 1</div>
    <div id="info" class="hud-item info">Sammle alle Münzen und erreiche dann das Ziel</div>
    <div id="roomCode" class="hud-item room-code"></div>
    <button id="copyRoom" class="copy-btn">Kopieren</button>
    <div id="playerCount" class="hud-item player-count">Spieler: 1</div>

    <div class="controls">
      <button id="leftBtn" class="control-btn left">◀</button>
      <button id="rightBtn" class="control-btn right">▶</button>
      <button id="upBtn" class="control-btn up">▲</button>
      <button id="downBtn" class="control-btn down">▼</button>
    </div>

    <div id="countdown" class="overlay hidden">
      <div class="countdown-box">
        <span id="countText" class="countdown-text">3</span>
      </div>
    </div>

    <div id="gameOver" class="overlay hidden">
      <div class="game-over-box">
        <h1 id="gameOverTitle">Game Over</h1>
        <p id="gameOverText">Du bist zu oft gestorben.</p>
        <button onclick="location.reload()" class="restart-btn">Neuer Versuch</button>
      </div>
    </div>

    <div id="startScreen" class="overlay">
      <div class="start-box">
        <h1>🎮 Parkour — Multiplayer</h1>
        <p>Bereit?</p>
        <button id="startBtn" class="start-btn">START</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
