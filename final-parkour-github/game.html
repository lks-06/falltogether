<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
  <title>Spiel – Multiplayer</title>

  <link rel="stylesheet" href="css/style.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/config.js"></script>
  <script src="js/levels.js"></script>
  <script src="js/multiplayer.js"></script>
  <script src="js/shared-coins.js"></script>
</head>
<body>
  <div id="gameWrapper" class="game-wrapper">
    <div id="world" class="world"></div>

    <div class="hud">
      <div>Score: <span id="score">0</span></div>
      <div>Münzen: <span id="remaining">?</span></div>
      <div>Lives: <span id="lives">3</span></div>
      <div>Munition: <span id="ammo">0</span> 🪙</div>
      <div>Level <span id="level">1</span></div>
      <div id="teamScore" style="margin-top:8px;color:#ffd400;font-weight:bold;">Team: 0/48 🪙</div>
      <div id="playerStats" style="margin-top:6px;font-size:13px;"></div>
    </div>

    <div class="room-hud">
      <div>Raum: <span id="roomCode">---</span>
        <button id="copyRoom">Kopieren</button>
      </div>
      <div>Spieler: <span id="playerCount">1</span></div>
    </div>

    <div id="info" class="info">Sammle alle Münzen und erreiche dann das Ziel</div>

    <div class="controls">
      <div class="side">
        <button id="leftBtn" class="ctrl">◀</button>
        <button id="rightBtn" class="ctrl">▶</button>
      </div>
      <div class="jumpcol">
        <button id="fireBtn" class="ctrl">🪙</button>
        <button id="upBtn" class="ctrl">▲</button>
        <button id="downBtn" class="ctrl">▼</button>
      </div>
    </div>

    <div id="countdown" class="countdown hidden">
      <div class="panel">
        <div id="countText" style="font-size:64px;font-weight:bold;">3</div>
      </div>
    </div>

    <div id="gameOver" class="game-over hidden">
      <div class="panel">
        <h1 id="gameOverTitle">Game Over</h1>
        <p id="gameOverText">Du bist zu oft gestorben.</p>
        <button onclick="location.reload()">Neuer Versuch</button>
      </div>
    </div>

    <div id="startScreen" class="start">
      <div class="panel">
        <h1>🎮 Parkour — Multiplayer</h1>
        <p>Bereit?</p>
        <button id="startBtn">START</button>
      </div>
    </div>
  </div>

  <script src="js/game.js"></script>
</body>
</html>
