<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>Parkour Spiel - Multiplayer</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="game-wrapper" id="gameWrapper">
  <div class="world" id="world"></div>
</div>

<!-- HUD links: Spielinfo -->
<div class="hud">
  <div>Level: <span id="level">1</span>/<span id="totalLevels">6</span></div>
  <div>Münzen: <span id="score">0</span></div>
  <div>Noch zu sammeln: <span id="remaining">0</span></div>
  <div>Leben: <span id="lives">3</span></div>
</div>

<!-- HUD rechts: Raum-Info -->
<div class="room-hud">
  <div>Raum: <span id="roomCode">---</span> <button id="copyRoom">Kopieren</button></div>
  <div>Spieler: <span id="playerCount">1</span></div>
</div>

<div class="info" id="info">Sammle alle Münzen und erreiche dann das Ziel</div>

<!-- Start-Screen -->
<div class="start" id="startScreen">
  <div class="panel">
    <h2>Parkour Multiplayer</h2>
    <p>Spielt zusammen! Wenn einer das Ziel erreicht, kommen alle zum nächsten Level.</p>
    <button class="ctrl" id="startBtn" style="width:140px;height:56px;font-size:20px">Start</button>
  </div>
</div>

<!-- Countdown -->
<div class="countdown hidden" id="countdown">
  <div class="panel">
    <div id="countText" style="font-size:70px;font-weight:bold">3</div>
  </div>
</div>

<!-- Game Over -->
<div class="game-over hidden" id="gameOver">
  <div class="panel">
    <h2 id="gameOverTitle">Geschafft!</h2>
    <p id="gameOverText"></p>
    <button class="ctrl" onclick="location.reload()" style="width:180px;height:56px;font-size:18px">Nochmal spielen</button>
  </div>
</div>

<!-- Mobile-Steuerung -->
<div class="controls">
  <div class="side">
    <button class="ctrl" id="leftBtn">◀</button>
    <button class="ctrl" id="rightBtn">▶</button>
  </div>
  <div class="jumpcol">
    <button class="ctrl" id="upBtn">▲</button>
    <button class="ctrl" id="downBtn">▼</button>
  </div>
</div>

<!-- Scripts (Reihenfolge wichtig!) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/config.js"></script>
<script src="js/levels.js"></script>
<script src="js/multiplayer.js"></script>
<script src="js/game.js"></script>
</body>
</html>
